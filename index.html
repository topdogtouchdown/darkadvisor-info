<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dark Advisor — Legal</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --accent: #0a84ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 480px; padding: 32px 20px; }
    h1 { font-size: 30px; margin: 0 0 4px; }
    p.sub { color: var(--muted); margin: 0 0 32px; }
    a.card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      color: var(--text);
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
    }
    a.card:hover { border-color: var(--accent); }
    a.card span { display: block; color: var(--muted); font-size: 14px; font-weight: 400; margin-top: 2px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Dark Advisor</h1>
    <p class="sub">Legal documents</p>
    <a class="card" href="./privacy-policy.html">Privacy Policy<span>How we handle your data</span></a>
    <a class="card" href="./terms-of-service.html">Terms of Service<span>The rules for using the app</span></a>
  </main>
</body>
</html>
